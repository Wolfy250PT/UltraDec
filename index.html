<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🇵🇹 Ultradex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
background:#111827;
padding:20px;
position:sticky;
top:0;
z-index:999;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.logo{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.logo img{
width:70px;
height:70px;
}

.logo h1{
font-size:3rem;
color:#facc15;
cursor:pointer;
}

main{
padding:20px;
}

.filters{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
}

input,select{
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
font-size:1rem;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:18px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.card:hover{
transform:translateY(-5px);
}

.pokemon-img{
width:100%;
height:180px;
object-fit:contain;
}

.big-img{
width:280px;
height:280px;
object-fit:contain;
display:block;
margin:auto;
}

.type{
display:inline-block;
padding:6px 12px;
border-radius:20px;
margin:4px;
font-weight:bold;
color:white;
}

.details{
background:#1e293b;
padding:25px;
border-radius:20px;
max-width:900px;
margin:auto;
}

.info-box{
background:#334155;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.loading{
text-align:center;
font-size:1.5rem;
margin-top:50px;
}

.watermark{
position:fixed;
bottom:15px;
right:15px;
opacity:0.2;
font-size:13px;
}

@media(max-width:768px){

.logo h1{
font-size:2rem;
}

.filters{
flex-direction:column;
align-items:center;
}

input,select{
width:100%;
max-width:350px;
}

.big-img{
width:220px;
height:220px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">

<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">

<h1 onclick="loadPokedex()">
🇵🇹 Ultradex
</h1>

</div>

</header>

<main id="app"></main>

<div class="watermark">
Ultradex
</div>

<script>

const typeColors={
normal:'#A8A878',
fire:'#F08030',
water:'#6890F0',
electric:'#F8D030',
grass:'#78C850',
ice:'#98D8D8',
fighting:'#C03028',
poison:'#A040A0',
ground:'#E0C068',
flying:'#A890F0',
psychic:'#F85888',
bug:'#A8B820',
rock:'#B8A038',
ghost:'#705898',
dragon:'#7038F8',
dark:'#705848',
steel:'#B8B8D0',
fairy:'#EE99AC'
};

const regions={
kanto:[1,151],
johto:[152,251],
hoenn:[252,386],
sinnoh:[387,493],
unova:[494,649],
kalos:[650,721],
alola:[722,809],
galar:[810,905],
paldea:[906,1025]
};

let allPokemon=[];

document.addEventListener('DOMContentLoaded',()=>{
loadPokedex();
});

async function loadPokedex(){

const app=document.getElementById('app');

app.innerHTML=`

<div class="filters">

<input
id="pokemonSearch"
placeholder="Pesquisar Pokémon"
oninput="filterPokemon()">

<select id="regionFilter" onchange="filterPokemon()">

<option value="">Todas Regiões</option>

<option value="kanto">Kanto</option>
<option value="johto">Johto</option>
<option value="hoenn">Hoenn</option>
<option value="sinnoh">Sinnoh</option>
<option value="unova">Unova</option>
<option value="kalos">Kalos</option>
<option value="alola">Alola</option>
<option value="galar">Galar</option>
<option value="paldea">Paldea</option>

</select>

<select id="typeFilter" onchange="filterPokemon()">

<option value="">Todos Tipos</option>

<option value="normal">Normal</option>
<option value="fire">Fire</option>
<option value="water">Water</option>
<option value="grass">Grass</option>
<option value="electric">Electric</option>
<option value="ice">Ice</option>
<option value="fighting">Fighting</option>
<option value="poison">Poison</option>
<option value="ground">Ground</option>
<option value="flying">Flying</option>
<option value="psychic">Psychic</option>
<option value="bug">Bug</option>
<option value="rock">Rock</option>
<option value="ghost">Ghost</option>
<option value="dragon">Dragon</option>
<option value="dark">Dark</option>
<option value="steel">Steel</option>
<option value="fairy">Fairy</option>

</select>

</div>

<div id="pokemonGrid" class="grid"></div>

`;

await loadPokemon();

renderPokemon(allPokemon);

}

async function loadPokemon(){

const grid=document.getElementById('pokemonGrid');

grid.innerHTML='<div class="loading">A carregar Pokédex...</div>';

const response=await fetch(
'https://pokeapi.co/api/v2/pokemon?limit=1025'
);

const data=await response.json();

allPokemon=data.results.map((pokemon,index)=>{

const id=index+1;

let region='paldea';

for(const reg in regions){

const [start,end]=regions[reg];

if(id>=start && id<=end){
region=reg;
break;
}

}

return{
id:id,
name:pokemon.name,
region:region,
image:`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`,
url:pokemon.url
};

});

const promises=allPokemon.map(async pokemon=>{

const response=await fetch(pokemon.url);

const data=await response.json();

pokemon.types=data.types.map(t=>t.type.name);

});

await Promise.all(promises);

}

function renderPokemon(list){

const grid=document.getElementById('pokemonGrid');

grid.innerHTML='';

list.forEach(pokemon=>{

grid.innerHTML+=`

<div class="card"
onclick="openPokemon('${pokemon.name}')">

<img
class="pokemon-img"
loading="lazy"
src="${pokemon.image}">

<h2>
#${pokemon.id}
${pokemon.name.replaceAll('-', ' ')}
</h2>

<div>

${pokemon.types.map(type=>`

<span
class="type"
style="background:${typeColors[type]}">

${type}

</span>

`).join('')}

</div>

</div>

`;

});

}

function filterPokemon(){

const search=document
.getElementById('pokemonSearch')
.value
.toLowerCase();

const region=document
.getElementById('regionFilter')
.value;

const type=document
.getElementById('typeFilter')
.value;

const filtered=allPokemon.filter(pokemon=>{

const matchSearch=
pokemon.name.includes(search) ||
pokemon.id.toString().includes(search);

const matchRegion=
!region || pokemon.region===region;

const matchType=
!type || pokemon.types.includes(type);

return matchSearch &&
matchRegion &&
matchType;

});

renderPokemon(filtered);

}

async function openPokemon(name){

const app=document.getElementById('app');

app.innerHTML='<div class="loading">A carregar Pokémon...</div>';

const response=await fetch(
`https://pokeapi.co/api/v2/pokemon/${name}`
);

const data=await response.json();

const speciesResponse=await fetch(data.species.url);

const speciesData=await speciesResponse.json();

const desc=speciesData.flavor_text_entries.find(
e=>e.language.name==='en'
);

app.innerHTML=`

<button onclick="loadPokedex()">
⬅ Voltar
</button>

<br><br>

<div class="details">

<img
class="big-img"
src="${data.sprites.other['official-artwork'].front_default}">

<h1>
#${data.id}
${data.name.toUpperCase()}
</h1>

<br>

<div>

${data.types.map(t=>`

<span
class="type"
style="background:${typeColors[t.type.name]}">

${t.type.name}

</span>

`).join('')}

</div>

<br>

<div class="info-box">

<h3>Descrição</h3>

<br>

<p>
${desc?.flavor_text.replace(/\f/g,' ') || 'Sem descrição.'}
</p>

</div>

<div class="info-box">

<h3>Status Base</h3>

<br>

${data.stats.map(stat=>`

<p>
<b>${stat.stat.name}:</b>
${stat.base_stat}
</p>

`).join('')}

</div>

<div class="info-box">

<h3>Altura e Peso</h3>

<br>

<p><b>Altura:</b> ${data.height/10}m</p>

<p><b>Peso:</b> ${data.weight/10}kg</p>

</div>

</div>

`;

}

</script>

</body>
</html>
